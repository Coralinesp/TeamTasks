trigger:
  branches:
    include:
      - main

pr: none

pool:
  name: Default

stages:
- stage: Validate
  displayName: Validate React App
  jobs:
  - job: Validate
    displayName: Install and validate
    steps:
    - checkout: self

    - task: UseNode@1
      displayName: Use Node.js
      inputs:
        version: '20.x'

    - script: npm install
      displayName: Install dependencies

    - script: npm run test --if-present
      displayName: Run tests (optional)

- stage: Package
  displayName: Build and publish
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: Build
    displayName: Build app
    steps:
    - checkout: self

    - task: UseNode@1
      displayName: Use Node.js
      inputs:
        version: '20.x'

    - script: |
        npm install
        npm run build
      displayName: Build React app

    - task: PublishPipelineArtifact@1
      displayName: Publish build artifact
      inputs:
        targetPath: 'build'
        artifact: 'react-build'