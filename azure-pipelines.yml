trigger:
  branches:
    include:
      - main

pr: none

pool:
  name: Default

stages:
- stage: Validate
  displayName: Validate React App
  jobs:
  - job: Validate
    displayName: Install and validate
    steps:
    - checkout: self

    - task: Cache@2
      displayName: Cache npm
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.npm

    - script: |
        npm i
        npm config set cache $(Pipeline.Workspace)/.npm --global
        npm ci
      displayName: Install dependencies

    - script: npm run lint --if-present
      displayName: Run lint (optional)

    - script: npm run test --if-present
      displayName: Run tests (optional)

- stage: Package
  displayName: Build and publish
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: Build
    displayName: Build app
    steps:
    - checkout: self

    - task: Cache@2
      displayName: Restore npm cache
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.npm

    - script: |
        npm i
        npm config set cache $(Pipeline.Workspace)/.npm --global
        npm ci
        npm run build
      displayName: Build React app

    # Para Vite normalmente es "dist"
    # Para Create React App normalmente es "build"
    - task: PublishPipelineArtifact@1
      displayName: Publish build artifact
      inputs:
        targetPath: 'dist'
        artifact: 'react-build'